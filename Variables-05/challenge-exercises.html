<body>
    <script>
        const name = "Ashraful";
        console.log(`My name is: ${name}`);

        // ---------

        const coffee = 5, bagel = 3, soup = 9; 

        let cost = coffee + (bagel*2) + soup;
        console.log(`Cost of food: $${cost}`);

        let taxDeduction = cost * 0.1;
        console.log(`Tax (10%): $${taxDeduction}`);

        let totalCost = cost + taxDeduction;
        console.log(`Total Cost: $${totalCost}`);
    </script>
