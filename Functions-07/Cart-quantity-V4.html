<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart Quantity</title>
  </head>
  <body>
    <p>Cart Quantity</p>
    <button onclick="console.log(`Cart Quantity: ${cartQuantity}`)">
      Show Quantity
    </button>

    <button onclick="updateCartQuantity(1)">Add to Cart</button>

    <button onclick="updateCartQuantity(2)">+2</button>

    <button onclick="updateCartQuantity(3)">+3</button>

    <button onclick="updateCartQuantity(4)">+4</button>

    <button onclick="updateCartQuantity(5)">+5</button>

    <button onclick="updateCartQuantity(-1)">Remove from Cart</button>

    <button onclick="updateCartQuantity(-2)">-2</button>

    <button onclick="updateCartQuantity(-3)">-3</button>

    <button
      onclick="
        cartQuantity = 0;
        console.log('Cart was Reset!');
        console.log(`Cart Quantity: ${cartQuantity}`);
      "
    >
      Reset Cart
    </button>

    <script>
      let cartQuantity = 0;
      const highestQuantity = 10;
      const lowestQuantity = 0;

      function updateCartQuantity(value) {
        if (value > 0) {
          if (cartQuantity + value > highestQuantity) {
            alert(`The Cart is Full.`);
            return;
          } else {
            cartQuantity += value;
            console.log(`Cart Quantity: ${cartQuantity}`);
          }
        } else if (value < 0) {
          if (cartQuantity + value < lowestQuantity) {
            alert(`Not Enough Items in The Cart.`);
            return;
          } else {
            cartQuantity += value;
            console.log(`Cart Quantity: ${cartQuantity}`);
          }
        }
      }
    </script>
  </body>
</html>
