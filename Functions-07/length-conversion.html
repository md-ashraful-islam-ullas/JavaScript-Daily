<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        function convertLength(length, from, to) {
            if (from === 'km' && to == 'mile') {
                const mile = 0.621371 * length;
                return [mile, to];
            } else if (from === 'mile' && to === 'km') {
                const km = 1.6 * length;
                return [km, to];
            } else if (from === 'mile' && to === 'ft') {
                const ft = 5280 * length;
                return [ft, to];
            } else if (from === 'km' && to === 'ft') {
                const ft = 3281 * length;
                return [ft, to];
            } 
        }


        const [length, to] = convertLength(5, 'km', 'ft');
        console.log(`${length}${to}`);
    </script>
</body>
</html>
