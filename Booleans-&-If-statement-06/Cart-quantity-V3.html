<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Quantity</title>
</head>
<body>
    <p>Cart Quantity</p>
    <button onclick="
        console.log(`Cart Quantity: ${cartQuantity}`)
    ">Show Quantity</button>

    <button onclick="
        if (cartQuantity >= highestQuantity) {
            alert(`The Cart is Full.`);
        } else {
            cartQuantity++;
            console.log(`Cart Quantity: ${cartQuantity}`);
        }
    ">Add to Cart</button>


    <button onclick="
        if (cartQuantity + 2 > highestQuantity) {
            alert(`The Cart is Full.`);
        } else {
            cartQuantity += 2;
            console.log(`Cart Quantity: ${cartQuantity}`);
        }
    ">+2</button>


    <button onclick="
        if (cartQuantity + 3 > highestQuantity) {
            alert(`The Cart is Full.`);
        } else {
            cartQuantity += 3;
            console.log(`Cart Quantity: ${cartQuantity}`);
        }
    ">+3</button>

    <button onclick="
        if (cartQuantity + 4 > highestQuantity) {
            alert(`The Cart is Full.`);
        } else {
            cartQuantity += 4;
            console.log(`Cart Quantity: ${cartQuantity}`);
        }
    ">+4</button>


    <button onclick="
        if (cartQuantity + 5 > highestQuantity) {
            alert(`The Cart is Full.`);
        } else {
            cartQuantity += 5;
            console.log(`Cart Quantity: ${cartQuantity}`);
        }
    ">+5</button>

    <button onclick="
        if (cartQuantity - 1 < lowestQuantity) {
            alert(`Not Enogh Items in The Cart.`);
        } else {
            cartQuantity--;
            console.log(`Cart Quantity: ${cartQuantity}`);
        }
    ">Remove from Cart</button>


    <button onclick="
        if (cartQuantity - 2 < lowestQuantity) {
            alert(`Not Enogh Items in The Cart.`);
        } else {
            cartQuantity -= 2;
            console.log(`Cart Quantity: ${cartQuantity}`);
        }
    ">-2</button>


    <button onclick="
        if (cartQuantity - 3 < lowestQuantity) {
            alert(`Not Enogh Items in The Cart.`);
        } else {
            cartQuantity -= 3;
            console.log(`Cart Quantity: ${cartQuantity}`);
        }
    ">-3</button>

    <button onclick="
        cartQuantity = 0;
        console.log('Cart was Reset!');
        console.log(`Cart Quantity: ${cartQuantity}`);
    ">Reset Cart</button>


    <script>
        let cartQuantity = 0;
        const highestQuantity = 10;
        const lowestQuantity = 0;
    </script>
</body>
</html>
