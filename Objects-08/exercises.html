<body>
    <script>
        const product = {
            basketball: 2095,
            'delivery-time': '3 days'
        }
        

        console.log(product.basketball);

        product.basketball += 500;
        console.log(product.basketball);
        console.log(product['delivery-time']);

        // --------------

        const product1 = {
            name: 'Basketball',
            price: 2095
        };

        const product2 = {
            name: 't-shirt',
            price: 10000
        };

        function comparePrice(product1, product2) {
            if (product1.price < product2.price) {
                return product1.name;
            } else {
                return product2.name;
            }
        }

        const product_name = comparePrice(product1, product2);
        console.log(product_name);

        // ------------

        const product3 = {
            name: 'Football',
            price: 2000
        };

        const product4 = {
            name: 'Football',
            price: 2000
        };

        function isSameProduct(product1, product2) {
            if ((product1.name === product2.name) && (product1.price === product2.price)) {
                return true;
            } else {
                return false;
            }
        }

        const similar_product_check = isSameProduct(product3, product4);
        console.log(similar_product_check);

        // ----------

        console.log('Good Morning'.toLowerCase());

        console.log('Hello'.repeat(2));

    </script>
