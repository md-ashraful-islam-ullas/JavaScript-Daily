<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>YouTube Subscribe Button</p>
    <button class="js-subscribe-button" onclick="subscribe()">Subscribe</button>

    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10 shipping.</p>
    <p>Orders over $40 = FREE shipping.</p>
    <input class="js-cost-input" type="text" placeholder="Cost of Order" onkeydown="handleCostKeyDown(event);">
    <button class="js-calculate" onclick="calculateTotal()">Calculate</button>
    <p class="js-total-cost"></p>

    <script>
        function handleCostKeyDown(event) {
            if (event.key === 'Enter') {
                calculateTotal();
            }
        };

        function calculateTotal() {
            const inputElement = document.querySelector('.js-cost-input');
            
            if (Number(inputElement.value) < 40) {
                document.querySelector('.js-total-cost').innerHTML = `$${Number(inputElement.value) + 10}`;
            } else {
                document.querySelector('.js-total-cost').innerHTML = `$${Number(inputElement.value)}`;
            }
        }

        function subscribe() {
            const buttonElement = document.querySelector('.js-subscribe-button');
        
            if (buttonElement.innerText === 'Subscribe') {
                buttonElement.innerText = 'Subscribed';
            } else {
                buttonElement.innerText = 'Subscribe';
            }
        };
    </script>
</body>
</html>
